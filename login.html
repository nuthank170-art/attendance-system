<!DOCTYPE html>

<html>

<head>

<title>Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{

font-family:Arial;

background:#f4f6f9;

margin:0;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

}


.box{

background:white;

padding:30px;

border-radius:10px;

box-shadow:0 0 15px rgba(0,0,0,0.2);

width:90%;

max-width:320px;

text-align:center;

}


h2{

margin-bottom:20px;

}


input{

width:100%;

padding:12px;

margin-top:10px;

border:1px solid #ccc;

border-radius:6px;

font-size:16px;

}


button{

width:100%;

padding:12px;

margin-top:15px;

background:#2c6fb7;

color:white;

border:none;

border-radius:6px;

font-size:16px;

cursor:pointer;

}

button:hover{

background:#1f4f87;

}

</style>

</head>


<body>


<div class="box">

<h2>Login</h2>

<form action="/dashboard">

<input placeholder="Enter ID">

<button>Enter</button>

</form>

</div>


</body>

</html>
