<!DOCTYPE html>

<html>

<head>

<title>Dashboard</title>

<style>

table{
border-collapse:collapse;
width:80%;
margin:auto
}

th,td{
border:1px solid black;
padding:10px;
text-align:center
}

button{
padding:5px 10px
}

</style>

</head>

<body>

<h2 align="center">Employee List</h2>

<div align="center">

<a href="/add_employee">

<button>Add Employee</button>

</a>

<br><br>

<table>

<tr>

<th>ID</th>

<th>Name</th>

<th>Designation</th>

<th>Location</th>

<th>Attendance</th>

</tr>

{% for e in employees %}

<tr>

<td>{{e[0]}}</td>

<td>{{e[1]}}</td>

<td>{{e[2]}}</td>

<td>{{e[3]}}</td>

<td>

<a href="/attendance/{{e[0]}}">

<button>Mark</button>

</a>

</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/excel">

<button>Download Excel</button>

</a>

</div>

</body>

</html>
