<!DOCTYPE html>

<html>

<head>

<title>Camera Attendance</title>

<style>

body{
font-family:Arial;
background:#f2f5f9;
text-align:center;
}

.box{
background:white;
width:450px;
margin:auto;
margin-top:30px;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px gray;
}

video{
width:100%;
max-width:420px;
border:2px solid #ccc;
border-radius:8px;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
border:none;
border-radius:5px;
cursor:pointer;
}

.inbtn{
background:#28a745;
color:white;
}

.outbtn{
background:#007bff;
color:white;
}

img{
width:140px;
margin:5px;
border-radius:5px;
border:1px solid gray;
}

</style>

</head>

<body>

<div class="box">

<h2>Camera Attendance</h2>

<video id="cam" autoplay playsinline muted></video>

<form method="post">

<input type="hidden" name="type" id="type">
<input type="hidden" name="image" id="image">

<br>

<button type="submit" class="inbtn" onclick="capture('IN')">
IN
</button>

<button type="submit" class="outbtn" onclick="capture('OUT')">
OUT
</button>

</form>

<h3>IN Photo</h3>
<img src="/static/{{emp_id}}_in.jpg">

<h3>OUT Photo</h3>
<img src="/static/{{emp_id}}_out.jpg">

</div>

<script>

navigator.mediaDevices.getUserMedia({video:true})
.then(function(stream){

document.getElementById("cam").srcObject = stream;

})
.catch(function(){

alert("Please allow camera permission");

});

function capture(type){

document.getElementById("type").value = type;

let video = document.getElementById("cam");

let canvas = document.createElement("canvas");

canvas.width = 420;
canvas.height = 320;

canvas.getContext("2d").drawImage(video,0,0);

document.getElementById("image").value =
canvas.toDataURL("image/jpeg");

}

</script>

</body>

</html>
