<!DOCTYPE html>
<html>

<head>

<title>Camera Attendance</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f5f9;
text-align:center;
margin:0;
padding:0;
}

.box{
background:white;
width:95%;
max-width:420px;
margin:auto;
margin-top:20px;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

video{
width:100%;
max-width:320px;
height:auto;
border-radius:12px;
border:2px solid #ccc;
background:black;
}

button{
padding:12px 18px;
margin:8px;
font-size:17px;
border:none;
border-radius:6px;
cursor:pointer;
width:130px;
}

.inbtn{
background:#28a745;
color:white;
}

.outbtn{
background:#007bff;
color:white;
}

img{
width:150px;
margin-top:8px;
border-radius:8px;
border:1px solid #bbb;
}

.time{
font-size:18px;
font-weight:bold;
margin-bottom:15px;
color:#333;
}

h3{
margin-bottom:5px;
margin-top:15px;
}

</style>

</head>

<body>

<div class="box">

<h2>Camera Attendance</h2>

<video id="cam" autoplay playsinline muted></video>

<form method="post">

<input type="hidden" name="type" id="type">
<input type="hidden" name="image" id="image">
<input type="hidden" name="location" id="location">

<br>

<button type="submit" class="inbtn" onclick="capture('IN')">
Punch IN
</button>

<button type="submit" class="outbtn" onclick="capture('OUT')">
Punch OUT
</button>

</form>

<h3>Preview</h3>

<img id="preview">

<div class="time">
{{in_time}}
</div>

</div>

<script>

async function startCamera(){

try{

const stream = await navigator.mediaDevices.getUserMedia({

video:{
width:{ideal:720},
height:{ideal:720},
facingMode:"user"
},

audio:false

})

document.getElementById("cam").srcObject = stream

}catch(e){

alert("Please allow camera permission")

}

}

startCamera()

function capture(type){

document.getElementById("type").value = type

let video = document.getElementById("cam")

let canvas = document.createElement("canvas")

canvas.width = video.videoWidth
canvas.height = video.videoHeight

let ctx = canvas.getContext("2d")

ctx.drawImage(video,0,0)

let imageData = canvas.toDataURL("image/jpeg",0.9)

document.getElementById("image").value = imageData

document.getElementById("preview").src = imageData

}

/* GPS capture */

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(

function(pos){

document.getElementById("location").value =
pos.coords.latitude + "," + pos.coords.longitude

}

)

}

</script>

</body>

</html>
