<!DOCTYPE html>

<html>

<head>

<title>Camera Attendance</title>

<style>

body{
font-family:Arial;
background:#f2f5f9;
text-align:center;
}

.box{
background:white;
width:420px;
margin:auto;
margin-top:30px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

video{
width:320px;
height:320px;
border-radius:10px;
border:2px solid #ccc;
object-fit:cover;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
border:none;
border-radius:5px;
cursor:pointer;
}

.inbtn{
background:#28a745;
color:white;
}

.outbtn{
background:#007bff;
color:white;
}

img{
width:150px;
margin:5px;
border-radius:6px;
border:1px solid gray;
}

.time{
font-size:18px;
font-weight:bold;
margin-bottom:15px;
}

</style>

</head>

<body>

<div class="box">

<h2>Camera Attendance</h2>

<video id="cam" autoplay playsinline muted></video>

<form method="post">

<input type="hidden" name="type" id="type">
<input type="hidden" name="image" id="image">

<br>

<button type="submit" class="inbtn" onclick="capture('IN')">
Punch IN
</button>

<button type="submit" class="outbtn" onclick="capture('OUT')">
Punch OUT
</button>

</form>

<h3>IN</h3>

<img src="/static/{{emp_id}}_in.jpg">

<div class="time">
{{in_time}}
</div>

<h3>OUT</h3>

<img src="/static/{{emp_id}}_out.jpg">

<div class="time">
{{out_time}}
</div>

</div>

<script>

async function startCamera(){

const stream = await navigator.mediaDevices.getUserMedia({

video:{
width:{ideal:720},
height:{ideal:720},
facingMode:"user"
}

})

document.getElementById("cam").srcObject = stream

}

startCamera()


function capture(type){

document.getElementById("type").value = type

let video = document.getElementById("cam")

let canvas = document.createElement("canvas")

canvas.width = 320
canvas.height = 320

let ctx = canvas.getContext("2d")

ctx.drawImage(video,0,0,320,320)

document.getElementById("image").value =
canvas.toDataURL("image/jpeg",0.95)

}

</script>

</body>

</html>
