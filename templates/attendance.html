<!DOCTYPE html>
<html>

<head>

<title>Camera Attendance</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#eef2f7;
text-align:center;
margin:0;
padding:0;
}

.box{
background:white;
width:95%;
max-width:420px;
margin:auto;
margin-top:20px;
padding:20px;
border-radius:12px;
box-shadow:0 0 12px rgba(0,0,0,0.15);
}

video{
width:100%;
border-radius:10px;
border:2px solid #ccc;
background:black;
}

button{
padding:12px 20px;
margin:10px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
width:130px;
}

.inbtn{
background:#28a745;
color:white;
}

.outbtn{
background:#007bff;
color:white;
}

.preview{
margin-top:15px;
}

.preview img{
width:160px;
border-radius:8px;
border:1px solid #bbb;
margin-top:5px;
}

.time{
font-weight:bold;
margin-top:4px;
}

</style>

</head>

<body>

<div class="box">

<h2>Camera Attendance</h2>

<video id="cam" autoplay playsinline muted></video>

<form method="post">

<input type="hidden" name="type" id="type">
<input type="hidden" name="image" id="image">

<br>

<button class="inbtn" onclick="capture('IN')">
Punch IN
</button>

<button class="outbtn" onclick="capture('OUT')">
Punch OUT
</button>

</form>

<div class="preview">

<h3>Preview</h3>

<img id="preview">

</div>


{% if in_image %}

<div class="preview">

<h3>IN</h3>

<img src="{{in_image}}">

<div class="time">

{{in_time}}

</div>

</div>

{% endif %}



{% if out_image %}

<div class="preview">

<h3>OUT</h3>

<img src="{{out_image}}">

<div class="time">

{{out_time}}

</div>

</div>

{% endif %}

</div>


<script>

async function startCamera(){

const stream = await navigator.mediaDevices.getUserMedia({

video:true

})

document.getElementById("cam").srcObject = stream

}

startCamera()


function capture(type){

document.getElementById("type").value = type

let video = document.getElementById("cam")

let canvas = document.createElement("canvas")

canvas.width = video.videoWidth
canvas.height = video.videoHeight

let ctx = canvas.getContext("2d")

ctx.drawImage(video,0,0)

let img = canvas.toDataURL("image/jpeg")

document.getElementById("image").value = img

document.getElementById("preview").src = img

}

</script>

</body>

</html>
